<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <defs>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feComponentTransfer in="blur" result="boosted">
        <feFuncA type="linear" slope="0.7"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boosted"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#1c1917"/>

  <!-- Amber border glow -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.35"/>

  <!-- Pixel R — 4px blocks, 5×6 glyph, centered -->
  <g filter="url(#bloom)" fill="#f5c842">
    <!-- Row 0: cols 0–3 -->
    <rect x="6"  y="4" width="4" height="4"/>
    <rect x="10" y="4" width="4" height="4"/>
    <rect x="14" y="4" width="4" height="4"/>
    <rect x="18" y="4" width="4" height="4"/>
    <!-- Row 1: cols 0, 4 -->
    <rect x="6"  y="8" width="4" height="4"/>
    <rect x="22" y="8" width="4" height="4"/>
    <!-- Row 2: cols 0–3 -->
    <rect x="6"  y="12" width="4" height="4"/>
    <rect x="10" y="12" width="4" height="4"/>
    <rect x="14" y="12" width="4" height="4"/>
    <rect x="18" y="12" width="4" height="4"/>
    <!-- Row 3: cols 0, 2 -->
    <rect x="6"  y="16" width="4" height="4"/>
    <rect x="14" y="16" width="4" height="4"/>
    <!-- Row 4: cols 0, 3 -->
    <rect x="6"  y="20" width="4" height="4"/>
    <rect x="18" y="20" width="4" height="4"/>
    <!-- Row 5: cols 0, 4 -->
    <rect x="6"  y="24" width="4" height="4"/>
    <rect x="22" y="24" width="4" height="4"/>
  </g>
</svg>
